<style>
  :root{ --bg:#ffffff; --fg:#111111; --dim:#8e8b84; --pad:clamp(2rem,7vw,6rem); }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--fg);font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:12px;line-height:1.6;-webkit-font-smoothing:antialiased;padding:0 var(--pad);}
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--fg);color:var(--bg);}

  .statusbar{display:flex;justify-content:space-between;align-items:center;padding:1.4rem 0;font-size:11px;color:var(--dim);text-transform:uppercase;position:sticky;top:0;background:var(--bg);z-index:10;}
  .statusbar a:hover{color:var(--fg);}
  .statusbar .nm a{color:var(--fg);}
  .menu-btn{background:none;border:none;cursor:pointer;padding:6px;display:flex;flex-direction:column;gap:4px;margin-left:-6px;}
  .menu-btn span{display:block;width:20px;height:1.5px;background:var(--fg);}

  .menu{position:fixed;top:0;left:0;height:100%;width:min(340px,86vw);background:var(--bg);border-right:1px solid #ededed;transform:translateX(-100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:50;padding:1.4rem 1.6rem;overflow-y:auto;}
  .menu.open{transform:translateX(0);box-shadow:30px 0 60px rgba(0,0,0,.06);}
  .menu .mtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;font-size:10px;text-transform:uppercase;color:var(--dim);}
  .menu .close{background:none;border:none;font-family:inherit;font-size:14px;cursor:pointer;color:var(--fg);}
  .menu .nav{display:flex;gap:1.2rem;margin-bottom:1.4rem;font-size:11px;text-transform:uppercase;}
  .menu .nav a{color:var(--dim);} .menu .nav a:hover{color:var(--fg);}
  .ygroup{border-top:1px solid #f0f0f0;} .ygroup:last-child{border-bottom:1px solid #f0f0f0;}
  .yhead{width:100%;background:none;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:.6rem;padding:.85rem 0;font-size:1.25rem;font-weight:500;color:var(--fg);}
  .yhead .cnt{font-size:10px;color:var(--dim);font-weight:400;}
  .yhead .arw{margin-left:auto;font-size:.9rem;color:var(--dim);transition:transform .25s;}
  .ygroup.open .yhead .arw{transform:rotate(45deg);}
  .ylist{max-height:0;overflow:hidden;transition:max-height .35s ease;}
  .ygroup.open .ylist{max-height:500px;}
  .wk{display:block;padding:.42rem 0 .42rem .9rem;font-size:12px;color:var(--dim);transition:padding-left .2s,color .2s;}
  .wk:hover{padding-left:1.4rem;color:var(--fg);}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.18);opacity:0;pointer-events:none;transition:opacity .3s;z-index:40;}
  .overlay.show{opacity:1;pointer-events:auto;}

  .head{padding:clamp(2rem,5vw,3.5rem) 0 clamp(1.5rem,4vw,2.5rem);}
  .head .cat{font-size:12px;text-transform:uppercase;color:var(--dim);margin-bottom:1rem;}
  .head h1{font-size:clamp(1.9rem,6.5vw,3.8rem);font-weight:700;line-height:1.05;}
  .head .desc{margin-top:1.4rem;max-width:640px;color:#6a675f;font-size:14px;line-height:1.7;}

  .specs{display:flex;flex-wrap:wrap;gap:1rem 2.6rem;margin:clamp(1.8rem,4vw,2.6rem) 0;}
  .specs .s .k{font-size:11px;text-transform:uppercase;color:var(--dim);margin-bottom:.4rem;}
  .specs .s .v{font-size:14px;}

  .gallery{display:flex;flex-direction:column;gap:clamp(.8rem,2vw,1.4rem);padding-bottom:clamp(2rem,5vw,3.5rem);}
  .gallery>img{width:100%;height:auto;display:block;}
  .gallery .img{width:100%;background:#f4f3f0;display:flex;align-items:center;justify-content:center;color:#cbc8c1;font-size:11px;text-transform:uppercase;min-height:120px;}
  
  .gallery .img img{width:100%;height:auto;display:block;}

  .navfoot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;padding:1.4rem 0 2.5rem;font-size:12px;text-transform:uppercase;}
  .navfoot a{color:var(--dim);transition:color .2s;} .navfoot a:hover{color:var(--fg);}

/* 이미지 감싸는 박스와 이미지 스타일 정렬 */
.piece {
  max-width: 800px;      /* 데스크탑에서 이미지가 늘어날 수 있는 최대 가로폭 */
  margin: 4rem auto;     /* 위아래 4rem 여백, 좌우 auto로 정중앙 정렬 */
  padding: 0 2rem;       /* 모바일 화면으로 줄어들었을 때 최소한의 좌우 여백 */
}

.piece-media {
  width: 100%;
  display: flex;
  justify-content: center; /* 이미지 중앙 정렬 */
  margin-bottom: 2rem;    /* 이미지와 아래 텍스트 사이의 간격 */
}

.piece-media img {
  width: 100%;           /* 부모 박스(max-width: 800px)에 맞게 꽉 채움 */
  height: auto;          /* 가로 비율에 맞춰 세로 크기 자동 조절 */
  display: block;
}

.piece-info {
  max-width: 100%;       /* 텍스트도 이미지 가로폭에 맞춰 정렬 */
  text-align: left;      /* 텍스트는 좌측 정렬 (중앙 정렬을 원하시면 center로 변경) */
}



  /* iframe(패널) 안에서 열렸을 때 */
  html.in-frame .statusbar{display:none;}
  html.in-frame body{padding-top:.5rem;}
</style>

<script>
  const menu=document.getElementById('menu'),ov=document.getElementById('overlay');
  document.getElementById('menuBtn').onclick=()=>{menu.classList.add('open');ov.classList.add('show');};
  document.getElementById('closeBtn').onclick=()=>{menu.classList.remove('open');ov.classList.remove('show');};
  ov.onclick=()=>{menu.classList.remove('open');ov.classList.remove('show');};
  document.querySelectorAll('.yhead').forEach(function(b){b.addEventListener('click',function(){b.parentElement.classList.toggle('open');});});
  // iframe(오른쪽 패널) 안에서 열렸을 땐 상단바/메뉴 숨김
  if(window.self!==window.top){ document.documentElement.classList.add('in-frame'); }

</script>
